<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Booking | Login & Register</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .tabs {
      display: flex;
      background: #f3f3f3;
    }

    .tabs button {
      flex: 1;
      padding: 15px;
      cursor: pointer;
      border: none;
      outline: none;
      background: #f3f3f3;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .tabs button.active {
      background: #2a5298;
      color: #fff;
    }

    form {
      display: none;
      flex-direction: column;
      padding: 30px;
    }

    form.active {
      display: flex;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2a5298;
    }

    label {
      margin-bottom: 5px;
      font-size: 14px;
      font-weight: 600;
      color: #444;
    }

    input,
    select {
      margin-bottom: 15px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
    }

    input:focus,
    select:focus {
      border-color: #2a5298;
    }

    button.submit-btn {
      background: #2a5298;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button.submit-btn:hover {
      background: #1e3c72;
    }

    .note {
      text-align: center;
      font-size: 13px;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="tabs">
      <button id="loginTab" class="active">Login</button>
      <button id="registerTab">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <form id="loginForm" class="active">
      <h2>Login</h2>
      <label for="loginEmail">Email</label>
      <input type="email" id="loginEmail" placeholder="Enter your email" required />

      <label for="loginPassword">Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" required />

      <button type="submit" class="submit-btn">Login</button>
      <p class="note">Welcome back! Book your favorite movies now 🎬</p>
    </form>

    <!-- REGISTER FORM -->
    <form id="registerForm">
      <h2>Register</h2>

      <label for="regName">Name</label>
      <input type="text" id="regName" placeholder="Enter your name" required />

      <label for="regEmail">Email</label>
      <input type="email" id="regEmail" placeholder="Enter your email" required />

      <label for="regPassword">Password</label>
      <input type="password" id="regPassword" placeholder="Create a password" required />

      <label for="regRole">Role</label>
      <select id="regRole" required>
        <option value="" disabled selected>Select your role</option>
        <option value="user">User</option>
        <option value="theater">Theater</option>
      </select>

      <button type="submit" class="submit-btn">Register</button>
      <p class="note">Join us and enjoy a seamless movie booking experience 🍿</p>
    </form>
  </div>

  <script src="config.js"></script>
  <script>
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");

    loginTab.addEventListener("click", () => {
      loginTab.classList.add("active");
      registerTab.classList.remove("active");
      loginForm.classList.add("active");
      registerForm.classList.remove("active");
    });

    registerTab.addEventListener("click", () => {
      registerTab.classList.add("active");
      loginTab.classList.remove("active");
      registerForm.classList.add("active");
      loginForm.classList.remove("active");
    });

    // Backend integration
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("loginEmail").value;
      const password = document.getElementById("loginPassword").value;

      try {
        const response = await fetch(`${CONFIG.BACKEND_URL}/api/auth/signin`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('user', JSON.stringify(data.user));
          alert('Login successful! Redirecting...');

          // Redirect based on user role
          if (data.user.role === 'theater') {
            window.location.href = 'theater-dashboard.html';
          } else {
            window.location.href = 'movies.html';
          }
        } else {
          alert(data.error || 'Login failed');
        }
      } catch (error) {
        alert('Network error. Please try again.');
        console.error('Login error:', error);
      }
    });

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("regName").value;
      const email = document.getElementById("regEmail").value;
      const password = document.getElementById("regPassword").value;
      const role = document.getElementById("regRole").value;

      try {
        const response = await fetch(`${CONFIG.BACKEND_URL}/api/auth/signup`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ name, email, password, role })
        });

        const data = await response.json();

        if (response.ok) {
          alert('Registration successful! Please login.');
          // Switch to login tab
          loginTab.click();
        } else {
          alert(data.error || 'Registration failed');
        }
      } catch (error) {
        alert('Network error. Please try again.');
        console.error('Registration error:', error);
      }
    });
  </script>
</body>

</html>
