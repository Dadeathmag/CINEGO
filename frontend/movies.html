<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineGo - Movies</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      min-height: 100vh;
    }

    .header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
    }

    .logo {
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .user-info {
      color: white;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .logout-btn {
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .logout-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .search-section {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }

    .search-bar {
      width: 100%;
      padding: 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .search-bar:focus {
      border-color: #2a5298;
    }

    .movies-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .movie-card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .movie-poster {
      width: 100%;
      height: 400px;
      background: linear-gradient(45deg, #f0f0f0, #e0e0e0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #666;
    }

    .movie-info {
      padding: 1.5rem;
    }

    .movie-title {
      font-size: 1.3rem;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #333;
    }

    .movie-details {
      color: #666;
      margin-bottom: 1rem;
    }

    .book-btn {
      width: 100%;
      background: #2a5298;
      color: white;
      border: none;
      padding: 0.8rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .book-btn:hover {
      background: #1e3c72;
    }

    .loading {
      text-align: center;
      color: white;
      font-size: 1.2rem;
      margin: 2rem 0;
    }

    .no-movies {
      text-align: center;
      color: white;
      font-size: 1.2rem;
      margin: 2rem 0;
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .container {
        padding: 0 1rem;
      }

      .movies-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="header">
    <div class="logo">🎬 CineGo</div>
    <div class="user-info">
      <span id="userName">Welcome!</span>
      <a href="user-bookings.html" class="logout-btn" style="text-decoration: none; margin-right: 1rem;">My Bookings</a>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="container">
    <div class="search-section">
      <input type="text" class="search-bar" id="searchInput" placeholder="Search movies...">
    </div>

    <div id="moviesContainer" class="movies-grid">
      <div class="loading">Loading movies...</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    let movies = [];
    let filteredMovies = [];

    // Check if user is logged in
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user) {
      window.location.href = 'login-register.html';
    } else {
      document.getElementById('userName').textContent = `Welcome, ${user.name}!`;
    }

    // Load movies
    async function loadMovies() {
      try {
        const response = await fetch(`${CONFIG.BACKEND_URL}/api/movies`);
        movies = await response.json();
        filteredMovies = movies;
        displayMovies();
      } catch (error) {
        console.error('Error loading movies:', error);
        document.getElementById('moviesContainer').innerHTML =
          '<div class="no-movies">Error loading movies. Please try again.</div>';
      }
    }

    // Display movies
    function displayMovies() {
      const container = document.getElementById('moviesContainer');

      if (filteredMovies.length === 0) {
        container.innerHTML = '<div class="no-movies">No movies found.</div>';
        return;
      }

      container.innerHTML = filteredMovies.map(movie => `
        <div class="movie-card" onclick="viewMovie(${movie.id})">
          <div class="movie-poster" style="background-image: url('${movie.poster_path ? 'https://image.tmdb.org/t/p/w300' + movie.poster_path : 'https://via.placeholder.com/300x400?text=No+Poster'}'); background-size: cover;">
            ${!movie.poster_path ? 'No Poster Available' : ''}
          </div>
          <div class="movie-info">
            <div class="movie-title">${movie.title || 'Movie ' + movie.id}</div>
            <div class="movie-details">
              ${movie.release_date ? movie.release_date.substring(0, 4) : 'N/A'} • 
              ${movie.vote_average ? movie.vote_average.toFixed(1) + '/10' : 'N/A'}<br>
              Shows: ${movie.show_count || 0} • Theaters: ${movie.theater_count || 0}
            </div>
            <button class="book-btn" onclick="event.stopPropagation(); bookMovie(${movie.id})">
              Book Now
            </button>
          </div>
        </div>
      `).join('');
    }

    // Search functionality
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const searchTerm = e.target.value.toLowerCase();
      filteredMovies = movies.filter(movie =>
        movie.tmdb_id.toString().includes(searchTerm) ||
        movie.id.toString().includes(searchTerm)
      );
      displayMovies();
    });

    // View movie details
    function viewMovie(movieId) {
      window.location.href = `movie-details.html?id=${movieId}`;
    }

    // Book movie
    function bookMovie(movieId) {
      window.location.href = `booking.html?movieId=${movieId}`;
    }

    // Logout
    function logout() {
      localStorage.removeItem('user');
      window.location.href = 'login-register.html';
    }

    // Load movies on page load
    loadMovies();
  </script>
</body>

</html>
